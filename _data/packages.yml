- name: python-caldav
  url: https://caldav.readthedocs.io/
  badge: stable
  badge_label: Stable
  description: "The only actively maintained Python CalDAV client. Sync and async, scheduling, free/busy, JMAP. Tested against a dozen real servers. Used by Home Assistant."
  categories:
    - featured
    - lib

- name: recurring-ical-events
  url: https://recurring-ical-events.readthedocs.io/
  badge: stable
  badge_label: Stable
  description: "Give it a calendar and a date range, get back every occurrence; exceptions and overrides included. Used by Nextcloud, Thunderbird, and Android."
  categories:
    - featured
    - lib

- name: icalendar-searcher
  url: https://github.com/pycalendar/icalendar-searcher
  badge: stable
  badge_label: Stable
  description: "Client-side search and filtering for iCalendar data, for when the server doesn't support the query you need."
  categories:
    - lib
    - cli

- name: python-mergecal
  url: https://mergecal.readthedocs.io/
  badge: stable
  badge_label: Stable
  description: "Merge multiple iCalendar feeds into one. Handles Google Calendar's timezone quirks, deduplicates events. Running in production at MergeCal.org and MyHebrewDates.com."
  categories:
    - lib
    - cli

- name: x-wr-timezone
  url: https://pypi.org/project/x-wr-timezone/
  badge: stable
  badge_label: Stable
  description: "Fixes the non-standard X-WR-TIMEZONE property that Google Calendar exports, so .ics files work correctly in strict parsers."
  categories:
    - lib
    - cli

- name: ics-query
  url: https://github.com/niccokunzmann/ics-query
  badge: stable
  badge_label: Stable
  description: "Query .ics files by time range and component type from the command line. Outputs valid .ics. Available via Homebrew, Windows .exe, or pip."
  categories:
    - cli

- name: ical2jcal
  url: https://github.com/niccokunzmann/ical2jcal
  badge: stable
  badge_label: Stable
  description: "Converts between iCalendar (RFC 5545, .ics) and jCal (RFC 7265, JSON) formats. Available as a Python library and CLI."
